<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Cachetona 🥰</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <!-- Foto flotante 1 (Izquierda) -->
    <div class="decoracion foto-1">
        <img src="https://ibb.co" alt="Nosotros">
    </div>

    <!-- Foto flotante 2 (Derecha) -->
    <div class="decoracion foto-2">
        <img src="https://ibb.co" alt="Recuerdo">
    </div>

    <!-- Palabras lindas flotando -->
    <div class="decoracion palabra p1">Eres mi vida ❤️</div>
    <div class="decoracion palabra p2">Siempre juntos 👩‍❤️‍👨</div>
    <div class="decoracion palabra p3">Mi lugar favorito 🌎</div>
    <div class="decoracion palabra p4">Te amo infinito ✨</div>

    <!-- Tu tarjeta central -->
    <div class="tarjeta">
        <!-- Foto principal del centro -->
        <img src="https://ibb.co" alt="Cachetona">
        
        <h1>¡Te adoro demasiado mi cachetona🥰!</h1>
        <p>Eres especial en mi vida, no sabes lo feliz que soy desde que te conocí. Espero poder compartir muchos momentos contigo. 🖤</p>
        <span class="corazon">❤️</span>
    </div>

</body>
</html>
